<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SlapMe 😈</title>
  <link rel="manifest" href="/slapdroid/manifest.json">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/slapdroid/sw.js');</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ff69b4;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
    }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; text-align: center; }
    h1 span { color: #ffe0f0; font-weight: 400; font-size: 14px; display: block; margin-top: 2px; text-align: center; }
    #unlock-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ff69b4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 999;
    }
    #unlock-screen h2 { font-size: 24px; font-weight: 600; text-align: center; }
    #unlock-screen p { font-size: 14px; color: #ffe0f0; text-align: center; padding: 0 32px; }
    #unlock-btn {
      padding: 16px 40px;
      background: #fff;
      color: #ff69b4;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    #status-bar {
      width: 100%; max-width: 400px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #fff;
    }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.4); flex-shrink: 0; transition: background 0.2s;
    }
    #status-dot.active { background: #fff; box-shadow: 0 0 6px #fff; }
    #status-dot.slap   { background: #ff1493; box-shadow: 0 0 8px #ff1493; }
    #slap-zone {
      width: 220px; height: 220px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: transform 0.1s, filter 0.1s;
    }
    #slap-zone.slapped { transform: scale(0.9); filter: brightness(1.2); }
    #stat-card {
      background: rgba(255,255,255,0.2); border-radius: 10px;
      padding: 14px 32px; text-align: center; border: 1px solid rgba(255,255,255,0.3);
    }
    .stat-label { font-size: 11px; color: #ffe0f0; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 26px; font-weight: 600; color: #fff; }
    #accel-bar {
      width: 100%; max-width: 400px;
      background: rgba(255,255,255,0.2); border-radius: 10px;
      padding: 12px 14px; border: 1px solid rgba(255,255,255,0.3);
    }
    #accel-title { font-size: 11px; color: #ffe0f0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    #accel-track { height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; }
    #accel-fill { height: 100%; width: 0%; background: #fff; transition: width 0.08s; border-radius: 3px; }

    body { transition: background 0.5s; }
    body.goat-mode { background: #7dc22e !important; }
    #unlock-screen { transition: background 0.5s; }
    #unlock-screen.goat-mode { background: #7dc22e !important; }
    #swap-btn {
      width: 100%; max-width: 400px;
      padding: 14px 20px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 50px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #swap-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div id="unlock-screen">
    <h2>SlapMe 😈</h2>
    <p>Appuie une fois pour activer le capteur et le son. Ensuite plus besoin de toucher l'écran !</p>
    <button id="unlock-btn" onclick="unlock()">😈 Activer</button>
  </div>

  <h1>SlapMe 😈 <span>Frappe ton téléphone. Il répond.</span></h1>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Appuie sur Activer...</span>

  <div id="slap-zone">

  </div>

  <div id="stat-card">
    <div class="stat-label">Baffes totales</div>
    <div class="stat-value" id="total-count">0</div>
  </div>

  <div id="accel-bar">
    <div id="accel-title">Capteur en direct</div>
    <div id="accel-track"><div id="accel-fill"></div></div>
  </div>

let bag = [];
function pickSound() {
  if (bag.length === 0) {
    bag = [...Array(soundsB64.length).keys()];
    for (let i = bag.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [bag[i], bag[j]] = [bag[j], bag[i]];
    }
  }
  return soundsB64[bag.pop()];
}

const sensitivity = 5;
const cooldown = 200;
let totalSlaps = 0;
let lastSlap = 0;
let lastMag = 0;
let unlocked = false;

function unlock() {
  unlocked = true;
  document.getElementById('unlock-screen').style.display = 'none';
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission().then(state => {
      if (state === 'granted') startListening();
      else setStatus('Permission refusée :(');
    });
  } else {
    startListening();
  }
}

function startListening() {
  window.addEventListener('devicemotion', handleMotion, true);
  document.getElementById('status-dot').className = 'active';
  document.getElementById('status-text').textContent = "Actif — frappe ton téléphone n'importe où !";
}

let goatMode = false;

function toggleMode() {
  goatMode = !goatMode;
  const body = document.body;
  const unlockScreen = document.getElementById('unlock-screen');
  const img = document.querySelector('#slap-zone img');
  const btn = document.getElementById('swap-btn');
  const unlockBtn = document.getElementById('unlock-btn');
  if (goatMode) {
    body.classList.add('goat-mode');
    unlockScreen.classList.add('goat-mode');
    img.src = '/slapdroid/ChatGPT_Image_28_mars_2026__14_54_58.png';
    btn.innerHTML = '😈 Passer en mode <strong style="margin-left:4px">Gémissements</strong>';
    unlockBtn.style.color = '#5fa31f';
  } else {
    body.classList.remove('goat-mode');
    unlockScreen.classList.remove('goat-mode');
    img.src = '/slapdroid/WAIFU.jpg';
    btn.innerHTML = '🐐 Passer en mode <strong style="margin-left:4px">Chèvres</strong>';
    unlockBtn.style.color = '#ff69b4';
  }
}

function playSound() {
  if (!unlocked) return;
  const src = goatMode
    ? '/slapdroid/Goat_Screaming_Meme_-_Sound_Effect__HD_.mp3'
    : pickSound();
  const audio = new Audio(src);
  audio.play().catch(() => {});
}

function triggerSlap(intensity) {
  const now = Date.now();
  if (now - lastSlap < cooldown) return;
  lastSlap = now;
  totalSlaps++;
  document.getElementById('total-count').textContent = totalSlaps;
  const zone = document.getElementById('slap-zone');
  zone.classList.add('slapped');
  setTimeout(() => zone.classList.remove('slapped'), 280);
  const dot = document.getElementById('status-dot');
  dot.className = 'slap';
  setTimeout(() => dot.className = 'active', 350);
  playSound();
}

function handleMotion(e) {
  const acc = e.accelerationIncludingGravity || e.acceleration;
  if (!acc) return;
  const x = acc.x || 0, y = acc.y || 0, z = acc.z || 0;
  const mag = Math.sqrt(x * x + y * y + z * z);
  const delta = Math.abs(mag - lastMag);
  lastMag = mag;
  document.getElementById('accel-fill').style.width = Math.min(delta / 40 * 100, 100) + '%';
  if (delta > sensitivity) triggerSlap(delta);
}

function setStatus(msg) { document.getElementById('status-text').textContent = msg; }
</script>
